    <text x="388" y="480" fill="#0d2b4e" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="900">Lakeview Suite</text>
    <text x="622" y="480" fill="#0d2b4e" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="900">Urban Loft</text>
