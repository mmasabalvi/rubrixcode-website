<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Nordvik rentals product preview</title>
  <desc id="desc">A premium rentals website mockup with property cards, booking UI, and responsive mobile preview.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#f4f7fa"/>
      <stop offset="1" stop-color="#eaf8ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#0d2b4e" flood-opacity="0.17"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <circle cx="1020" cy="170" r="210" fill="#00bfff" opacity="0.1"/>
  <g filter="url(#shadow)">
    <rect x="94" y="96" width="772" height="520" rx="30" fill="#fff"/>
    <rect x="128" y="132" width="704" height="176" rx="24" fill="#0d2b4e"/>
