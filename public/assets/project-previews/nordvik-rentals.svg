    <text x="166" y="226" fill="#dce7ef" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="600">Premium stays, clean booking flows, and trust-first UI.</text>
    <rect x="166" y="252" width="142" height="38" rx="15" fill="#00bfff"/>
    <text x="195" y="276" fill="#fff" font-family="Poppins, Arial, sans-serif" font-size="12" font-weight="900">Explore Homes</text>
    <rect x="128" y="342" width="206" height="214" rx="22" fill="#f4f7fa"/>
    <rect x="362" y="342" width="206" height="214" rx="22" fill="#f4f7fa"/>
    <rect x="596" y="342" width="206" height="214" rx="22" fill="#f4f7fa"/>
    <rect x="154" y="368" width="154" height="76" rx="18" fill="#d9f6ff"/>
    <rect x="388" y="368" width="154" height="76" rx="18" fill="#d9f6ff"/>
    <rect x="622" y="368" width="154" height="76" rx="18" fill="#d9f6ff"/>
