    <text x="388" y="512" fill="#00668a" font-family="Poppins, Arial, sans-serif" font-size="13" font-weight="900">$180 / night</text>
    <text x="622" y="512" fill="#00668a" font-family="Poppins, Arial, sans-serif" font-size="13" font-weight="900">$145 / night</text>
